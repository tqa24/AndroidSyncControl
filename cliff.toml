# git-cliff configuration -- https://git-cliff.org/docs/configuration
# Generates CHANGELOG.md (local timeline) from Conventional Commits. Version numbers
# come from GitVersion; this only groups commits by tag [vV]?X.Y.Z.

[changelog]
# Header at the top of the changelog.
header = """
# Changelog

All notable changes to this project are documented here.
This file is generated by [git-cliff](https://git-cliff.org) from Conventional Commits.

A **timeline read bottom-to-top**: each `## [M.m.0]` is the tag that opened a minor line; the
commits stacked ABOVE it are that line's successive versions `M.m.1`, `M.m.2`, ... (patch number =
commits since the tag), newest on top. Each line shows its version, conventional type, and message.\n
"""
# Body: each tag is a marker; commits listed flat as a timeline. Tera syntax.
body = """
{% for commit in commits %}\
- {% if previous.version %}{% set p = previous.version | trim_start_matches(pat="v") | split(pat=".") %}{% set n = commits | length %}{{ p.0 }}.{{ p.1 }}.{{ n - loop.index0 }} {% endif %}*({{ commit.group }})* {% if commit.scope %}**({{ commit.scope }})** {% endif %}{{ commit.message | upper_first }}{% if commit.breaking %} [**breaking**]{% endif %}
{% endfor %}\
{% if previous.version %}## [{{ previous.version | trim_start_matches(pat="v") }}]{% else %}## [Unreleased]{% endif %}
\n
"""
# Footer at the end of the file.
footer = """
<!-- generated by git-cliff -->
"""
# Trim leading/trailing whitespace.
trim = true

[git]
# Parse commits as Conventional Commits.
conventional_commits = true
# Drop non-conventional commits (e.g. merges, raw commits).
filter_unconventional = true
# Do not split a commit body into multiple entries.
split_commits = false
# Clean up messages before parsing.
commit_preprocessors = [
    # Collapse runs of spaces.
    { pattern = '  +', replace = " " },
]
# Tag each commit with a short 'type' (shown inline as (feat), (docs)...). No group_by so
# order follows the timeline; 'group' is used only as the type prefix.
commit_parsers = [
    { message = "^feat", group = "feat" },
    { message = "^fix", group = "fix" },
    { message = "^perf", group = "perf" },
    { message = "^refactor", group = "refactor" },
    { message = "^docs", group = "docs" },
    { message = "^test", group = "test" },
    { message = "^build", group = "build" },
    { message = "^ci", group = "ci" },
    { message = "^style", group = "style" },
    { message = "^revert", group = "revert" },
    { message = "^sample", group = "sample" },
    { message = "^chore\\(release\\):", skip = true },
    { message = "^chore\\(deps\\)", skip = true },
    { message = "^chore", group = "chore" },
    { message = ".*", group = "other" },
]
# Keep merge commits (they are dropped anyway as non-conventional).
filter_commits = false
# Only pick up tags like [vV]?X.Y.Z (matches GitVersion tag-prefix '[vV]?').
tag_pattern = '[vV]?[0-9]+\.[0-9]+\.[0-9]+'
# Timeline: newest commit on top within each line.
sort_commits = "newest"
