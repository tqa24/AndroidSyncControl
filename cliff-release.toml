# git-cliff config for GitHub Release notes (used by .github/workflows/release.yml).
# Differs from cliff.toml (local CHANGELOG.md): NO header/footer, ASCENDING order
# (oldest first), numbered M.N.<n>. Used with range '<tag>..HEAD' (commits since tag M.N.0).

[changelog]
header = ""
# Only list change types users care about. Filter at the DISPLAY step (not skipped from
# the array) so loop.index stays = real commit count since the tag -> correct numbers,
# with gaps where a type is hidden. To add/remove types edit `commit.group in [...]` below.
body = """
{% for commit in commits %}\
{% if commit.group in ["feat", "fix", "perf", "revert"] %}\
- __MN__.{{ loop.index }} ({{ commit.group }}){% if commit.scope %} **{{ commit.scope }}**{% endif %} {{ commit.message | upper_first }}{% if commit.breaking %} [**breaking**]{% endif %}
{% endif %}\
{% endfor %}\
"""
footer = ""
trim = true

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false
commit_preprocessors = [
    { pattern = '  +', replace = " " },
]
commit_parsers = [
    { message = "^feat", group = "feat" },
    { message = "^fix", group = "fix" },
    { message = "^perf", group = "perf" },
    { message = "^refactor", group = "refactor" },
    { message = "^docs", group = "docs" },
    { message = "^test", group = "test" },
    { message = "^build", group = "build" },
    { message = "^ci", group = "ci" },
    { message = "^style", group = "style" },
    { message = "^revert", group = "revert" },
    { message = "^sample", group = "sample" },
    { message = "^chore", group = "chore" },
    { message = ".*", group = "other" },
    # No skip here: every commit must stay in the array so loop.index = real commit count
    # since the tag (= GitVersion). Which types are shown is decided in the body template.
]
filter_commits = false
tag_pattern = '[vV]?[0-9]+\.[0-9]+\.[0-9]+'
# Ascending: oldest commit (right after the tag) first, loop.index = 1 -> M.N.1
sort_commits = "oldest"
